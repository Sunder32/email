services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - internal

  backend:
    build: ./backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    env_file: .env
    volumes:
      - ./backend:/app
    networks:
      - internal
    depends_on:
      - postgres
      - redis

  celery-worker:
    build: ./backend
    restart: always
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    volumes:
      - ./backend:/app
    networks:
      - internal
    depends_on:
      - postgres
      - redis

  celery-beat:
    build: ./backend
    restart: always
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file: .env
    volumes:
      - ./backend:/app
    networks:
      - internal
    depends_on:
      - redis

  frontend:
    build: ./frontend
    restart: always
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    networks:
      - internal
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
